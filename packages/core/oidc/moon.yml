language: typescript
layer: library

tasks:
  build:
    command: pnpm build
    deps: 
      - ^:build
    outputs:
      - dist/

  format:
    command: pnpm format

  lint:
    command: pnpm lint

  test:
    command: pnpm test
    outputs:
      - coverage/

  release:
    command: pnpm release
