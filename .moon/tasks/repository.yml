inheritedBy:
  language: bash

tasks:
  coverage_purge:
    description: Delete all coverage folders
    command: find . -type d -name "coverage" -prune -exec rm -rf {} +
    options:
      cache: false
      outputStyle: stream

  dist_purge:
    description: Delete all dist folders
    command: find . -type d -name "dist" -prune -exec rm -rf {} +
    options:
      cache: false
      outputStyle: stream

  node_modules_purge:
    description: Delete all node_modules folders
    command: find . -type d -name "node_modules" -prune -exec rm -rf {} +
    options:
      cache: false
      outputStyle: stream
