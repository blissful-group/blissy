name: Feature workflow
run-name: Feature guards on '${{ github.event.pull_request.title || github.ref_name }}' 🌡️...
permissions: write-all
on:
  pull_request:
jobs:
  # =============================================================
  # Verifies that unreleased changesets are valid for the branch.
  # =============================================================
  changeset:
    name: Checking changesets 📝...
    if: ${{ !contains(github.head_ref, 'changeset-release') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache local dependencies
        if: inputs.cache-name
        uses: actions/cache@v5
        with:
          path: |
            ~/.local
            ~/.pnpm-store
          key: cache-local-changeset-${{ hashFiles('**/package.json') }}
          restore-keys: |
            cache-local-changeset
            cache-local-

      - name: Inject Moon
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          cache: true
          cache-base: ${{ github.event.repository.default_branch }}

      - name: Set pnpm store directory
        run: pnpm config set store-dir "~/.pnpm-store"

      - name: Add local binaries to PATH
        run: echo "~/.local/bin" >> $GITHUB_PATH

      - name: Check changesets
        id: check-changesets
        run: |
          set -euo pipefail
          pnpx @changesets/cli status \
            --since origin/${{ github.event.repository.default_branch }}

      - name: Summarize changeset result
        if: always()
        run: |
          set -euo pipefail

          {
            printf '### Changeset result\n\n'
            printf -- '- Command: `pnpx @changesets/cli status --since origin/${{ github.event.repository.default_branch }}`\n'
            printf -- '- Result: `%s`\n' '${{ steps.check-changesets.outcome }}'
            printf -- '- Status: `%s`\n\n' '${{ steps.check-changesets.conclusion }}'
          } >> "$GITHUB_STEP_SUMMARY"

  # =============================================================
  # Runs the standard lint and test targets for pull requests.
  # =============================================================
  test:
    name: Running tests 🌡️...
    if: ${{ !contains(github.head_ref, 'changeset-release') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache local dependencies
        if: inputs.cache-name
        uses: actions/cache@v5
        with:
          path: |
            ~/.local
            ~/.pnpm-store
          key: cache-local-test-${{ hashFiles('**/package.json') }}
          restore-keys: |
            cache-local-test
            cache-local-

      - name: Inject Moon
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          cache: true
          cache-base: ${{ github.event.repository.default_branch }}

      - name: Set pnpm store directory
        run: pnpm config set store-dir "~/.pnpm-store"

      - name: Add local binaries to PATH
        run: echo "~/.local/bin" >> $GITHUB_PATH

      - name: Summarize test scope
        run: |
          set -euo pipefail

          moon query changed-files --base "${{ github.event.pull_request.base.sha }}" --head HEAD > changed-files.json
          moon query projects --affected < changed-files.json > affected-projects.json

          changed_file_count=$(jq 'length' changed-files.json)
          affected_project_count=$(jq '.projects | length' affected-projects.json)
          affected_projects=$(jq -r '.projects | map(.id) | unique | sort | if length == 0 then "none" else join(", ") end' affected-projects.json)

          {
            printf '### Test scope\n\n'
            printf -- '- Changed files found by `moon query changed-files`: `%s`\n' "$changed_file_count"
            printf -- '- Affected projects found by `moon query projects --affected`: `%s`\n' "$affected_project_count"
            printf -- '- Projects: `%s`\n\n' "$affected_projects"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run tests 🌡️...
        id: run-tests
        run: moon ci :lint :test

      - name: Summarize test result
        if: always()
        run: |
          set -euo pipefail

          {
            printf '### Test result\n\n'
            printf -- '- Lint and test command: `moon ci :lint :test`\n'
            printf -- '- Result: `%s`\n\n' '${{ steps.run-tests.outcome }}'
          } >> "$GITHUB_STEP_SUMMARY"
