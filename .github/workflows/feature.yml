name: Feature
run-name: Feature checks on '${{ github.event.pull_request.title || github.ref_name }}' 🌡️...
permissions: write-all
on:
  pull_request:
jobs:
  # ==========
  # Changesets
  # ==========
  changeset:
    name: Checking changesets 📝...
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache local dependencies
        if: inputs.cache-name
        uses: actions/cache@v5
        with:
          path: |
            ~/.local
            ~/.pnpm-store
          key: cache-local-feature-${{ hashFiles('**/package.json') }}
          restore-keys: |
            cache-local-feature
            cache-local-

      - name: Inject Moon
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          cache: true
          cache-base: ${{ github.event.repository.default_branch }}

      - name: Set pnpm store directory
        run: pnpm config set store-dir "~/.pnpm-store"

      - name: Add local binaries to PATH
        run: echo "~/.local/bin" >> $GITHUB_PATH

      - name: Check changesets
        id: check-changesets
        run: |
          set -euo pipefail
          pnpx @changesets/cli status \
            --since origin/${{ github.event.repository.default_branch }}

      - name: Summarize changeset result
        if: always()
        run: |
          set -euo pipefail

          {
            printf '### Changeset result\n\n'
            printf -- '- Command: `pnpx @changesets/cli status --since origin/${{ github.event.repository.default_branch }}`\n'
            printf -- '- Result: `%s`\n' '${{ steps.check-changesets.outcome }}'
            printf -- '- Status: `%s`\n\n' '${{ steps.check-changesets.conclusion }}'
          } >> "$GITHUB_STEP_SUMMARY"

  # =======
  # Linting
  # =======
  lint:
    name: Running lint 🔬...
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache local dependencies
        if: inputs.cache-name
        uses: actions/cache@v5
        with:
          path: |
            ~/.local
            ~/.pnpm-store
          key: cache-local-feature-${{ hashFiles('**/package.json') }}
          restore-keys: |
            cache-local-feature
            cache-local-

      - name: Inject Moon
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          cache: true
          cache-base: ${{ github.event.repository.default_branch }}

      - name: Set pnpm store directory
        run: pnpm config set store-dir "~/.pnpm-store"

      - name: Add local binaries to PATH
        run: echo "~/.local/bin" >> $GITHUB_PATH

      - name: Run lint 🔬...
        id: run-lint
        run: moon ci :lint

      - name: Summarize test result
        if: always()
        run: |
          set -euo pipefail

          {
            printf '### Test result\n\n'
            printf -- '- Lint command: `moon ci :lint`\n'
            printf -- '- Result: `%s`\n\n' '${{ steps.run-lint.outcome }}'
          } >> "$GITHUB_STEP_SUMMARY"

  # ==========
  # Unit tests
  # ==========
  test:
    name: Running tests 🌡️...
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache local dependencies
        if: inputs.cache-name
        uses: actions/cache@v5
        with:
          path: |
            ~/.local
            ~/.pnpm-store
          key: cache-local-feature-${{ hashFiles('**/package.json') }}
          restore-keys: |
            cache-local-feature
            cache-local-

      - name: Inject Moon
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
          cache: true
          cache-base: ${{ github.event.repository.default_branch }}

      - name: Set pnpm store directory
        run: pnpm config set store-dir "~/.pnpm-store"

      - name: Add local binaries to PATH
        run: echo "~/.local/bin" >> $GITHUB_PATH

      - name: Run tests 🌡️...
        id: run-tests
        run: moon ci :test

      - name: Summarize test result
        if: always()
        run: |
          set -euo pipefail

          {
            printf '### Test result\n\n'
            printf -- '- Test command: `moon ci :test`\n'
            printf -- '- Result: `%s`\n\n' '${{ steps.run-tests.outcome }}'
          } >> "$GITHUB_STEP_SUMMARY"
